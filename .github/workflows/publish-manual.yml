name: Publish to crates.io (manual)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # `k8s-openapi` (transitive via `kube`) refuses to compile a library crate
  # without a v1_* feature, but it equally refuses to let library crates
  # enable one in their `[dependencies]`. The standard fix is dev-deps —
  # but `cargo publish` does not activate dev-deps during its verification
  # build. The k8s-openapi build script honours K8S_OPENAPI_ENABLED_VERSION
  # as the documented escape hatch for this exact case. Pin to the version
  # the workspace targets (matches the v1_31 feature on dev-deps + leaf
  # binaries, see Cargo.toml).
  K8S_OPENAPI_ENABLED_VERSION: "1.31"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish muxtop-core
        run: |
          if out=$(cargo publish --package muxtop-core 2>&1); then
            echo "$out"
          else
            echo "$out"
            echo "$out" | grep -q "already exists" || exit 1
          fi
          sleep 30
      - name: Publish muxtop-proto
        run: |
          if out=$(cargo publish --package muxtop-proto 2>&1); then
            echo "$out"
          else
            echo "$out"
            echo "$out" | grep -q "already exists" || exit 1
          fi
          sleep 30
      - name: Publish muxtop-tui
        run: |
          if out=$(cargo publish --package muxtop-tui 2>&1); then
            echo "$out"
          else
            echo "$out"
            echo "$out" | grep -q "already exists" || exit 1
          fi
          sleep 30
      - name: Publish muxtop
        run: |
          if out=$(cargo publish --package muxtop 2>&1); then
            echo "$out"
          else
            echo "$out"
            echo "$out" | grep -q "already exists" || exit 1
          fi
